# Production compose file — copy this onto your Windows Docker host.
#
# Recommended location: C:\Docker\vibefolio\docker-compose.yml
# Run with PowerShell:  docker compose pull ; docker compose up -d
#
# The container exposes port 80 internally. Pick ONE strategy below
# depending on how Cloudflare is wired to your host.

services:
  vibefolio:
    image: ghcr.io/tholeeg/vibefolio:latest
    container_name: vibefolio
    restart: unless-stopped

    # ── Strategy A — cloudflared as a Windows service / .exe ───────
    # cloudflared runs natively on Windows and reaches the container
    # through the host loopback. No port is exposed to the LAN.
    # In your Cloudflare Zero Trust → Tunnels → Public Hostname, add:
    #   vibefolio.thomasleguern.com  →  http://localhost:8080
    ports:
      - "127.0.0.1:8080:80"

    # ── Strategy B — cloudflared running in Docker ─────────────────
    # If your cloudflared container already exists, attach this
    # service to its network and remove the `ports:` block above.
    # In Cloudflare Zero Trust → Public Hostname, target:
    #   http://vibefolio:80
    #
    # networks:
    #   - cloudflared
    # (Adjust the network name to match what `docker network ls`
    #  shows for your cloudflared setup.)

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

# Uncomment if you use Strategy B:
# networks:
#   cloudflared:
#     external: true
