# Production compose file — copy this onto your Windows Docker host.
#
# Location on the server: C:\Docker\vibefolio\docker-compose.yml
#
# Setup:
#   - Cloudflare Tunnel runs as a Docker container (`chart-cloudflared`)
#     attached to the `chart-generator_chart-net` network.
#   - This service joins the same network so cloudflared can reach it
#     by container name. No port is exposed on the host.
#
# Cloudflare Zero Trust → Tunnels → Public Hostname:
#   vibefolio.thomasleguern.com  →  http://vibefolio:80
#
# Auto-updates are handled by the existing Watchtower container on the
# host. The label below opts this service in for hosts running
# Watchtower in "label-only" mode (and is harmless in "all" mode).

services:
  vibefolio:
    image: ghcr.io/tholeeg/vibefolio:latest
    container_name: vibefolio
    restart: unless-stopped

    networks:
      - cloudflared

    labels:
      com.centurylinklabs.watchtower.enable: "true"

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  cloudflared:
    name: chart-generator_chart-net
    external: true
