# Production compose file — copy this onto your Windows Docker host.
#
# After pulling: `docker compose pull && docker compose up -d`
#
# The container exposes port 80 internally. Pick ONE of the routing
# strategies below depending on the reverse proxy you already use.

services:
  vibefolio:
    image: ghcr.io/tholeeg/vibefolio:latest
    container_name: vibefolio
    restart: unless-stopped

    # ── Strategy A — Reverse-proxy on the host (default) ───────────
    # The container is reachable on http://localhost:8080 of the
    # Docker host. Point your existing reverse proxy (Nginx Proxy
    # Manager, IIS+ARR, raw Nginx, Caddy, etc.) at that target for
    # https://vibefolio.thomasleguern.com.
    ports:
      - "127.0.0.1:8080:80"

    # ── Strategy B — Traefik labels (uncomment if you use Traefik) ──
    # Make sure the `proxy` network already exists and Traefik is
    # configured with HTTP→HTTPS redirection + a Let's Encrypt resolver
    # named `letsencrypt`. Remove the `ports:` block above if you use
    # this strategy.
    #
    # networks:
    #   - proxy
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.vibefolio.rule=Host(`vibefolio.thomasleguern.com`)"
    #   - "traefik.http.routers.vibefolio.entrypoints=websecure"
    #   - "traefik.http.routers.vibefolio.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.vibefolio.loadbalancer.server.port=80"

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

# Uncomment if you use Strategy B:
# networks:
#   proxy:
#     external: true
