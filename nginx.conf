server {
    listen       80 default_server;
    listen  [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip ────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml
        font/ttf
        font/otf;

    # ── Long-cache hashed assets, no-cache for HTML ─────────────────
    # Vite emits hashed filenames in /assets/, so they can be cached
    # forever. The HTML shell must NOT be cached or users won't pick
    # up new builds.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg { expires 7d; access_log off; }
    location = /favicon.ico { expires 7d; access_log off; }
    location = /og.png      { expires 7d; access_log off; }

    # ── SPA fallback ────────────────────────────────────────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ── Hardening ───────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # Permissions we don't use; tighten to limit fingerprinting.
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # Hide Nginx version.
    server_tokens off;
}
